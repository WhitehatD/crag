name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: Governance gates + tests (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax check CLI entry
        run: node --check bin/crag.js

      - name: Syntax check all modules
        shell: bash
        run: |
          set -e
          for f in bin/crag.js src/cli.js src/commands/*.js src/workspace/*.js src/governance/*.js src/compile/*.js src/update/*.js src/analyze/*.js; do
            node --check "$f"
          done
          echo "All modules parse successfully."

      - name: crag help
        run: node bin/crag.js help

      - name: crag version
        run: node bin/crag.js version

      # Note: `crag check` and `crag diff` are deliberately NOT run in CI.
      # They verify a Claude Code session's runtime infrastructure
      # (.claude/skills, .claude/hooks, .claude/governance.md) — state that
      # only exists on a developer's machine or inside a Claude Code session,
      # not in a bare CI runner. CI validates source code; those commands
      # validate the consumer's installed environment.
      #
      # `crag doctor --ci` IS run below: it skips the Infrastructure/Skills/
      # Hooks sections that need runtime infrastructure and only runs the
      # checks that are meaningful in a bare CI (governance parses, no
      # secrets, drift vs git, environment).

      - name: crag analyze --dry-run
        run: node bin/crag.js analyze --dry-run

      - name: crag upgrade --check
        run: node bin/crag.js upgrade --check
        env:
          CRAG_NO_UPDATE_CHECK: '1'

      - name: crag workspace --json
        run: node bin/crag.js workspace --json

      - name: crag doctor --ci
        shell: bash
        run: |
          # doctor --ci needs an on-disk governance.md; analyze --dry-run
          # doesn't write one. Generate it, run doctor, then remove the
          # generated dir (gitignored, but keeps later steps hermetic).
          node bin/crag.js analyze > /dev/null
          node bin/crag.js doctor --ci
          rm -rf .claude

      - name: crag demo (self-contained proof-of-value + determinism check)
        shell: bash
        env:
          CRAG_NO_UPDATE_CHECK: '1'
          NO_COLOR: '1'
        run: |
          # Runs on every CI matrix slot: creates a synthetic polyglot project,
          # exercises analyze/diff/compile, and SHA-256-verifies that two
          # back-to-back analyze runs produce byte-identical output. If this
          # ever fails, determinism is broken and the release must be blocked.
          # Use RUNNER_TEMP which is defined on every GitHub runner (Linux,
          # macOS, Windows) — plain /tmp is not portable to Windows bash.
          node bin/crag.js demo --json > "$RUNNER_TEMP/demo-output.json"
          node -e "
            const d = JSON.parse(require('fs').readFileSync(process.env.RUNNER_TEMP + '/demo-output.json','utf-8'));
            if (!d.deterministic || !d.deterministic.ok) {
              console.error('DEMO DETERMINISM FAILED', d.deterministic);
              process.exit(1);
            }
            if (d.totalMs > 10000) {
              console.error('DEMO TOO SLOW:', d.totalMs, 'ms');
              process.exit(1);
            }
            console.log('demo:', d.totalMs + 'ms', 'sha:' + d.deterministic.hash1.slice(0,12));
          "

      - name: Run test suite
        run: node test/all.js

      - name: Verify pre-start skill content
        shell: bash
        run: grep -qi "discovers any project" src/skills/pre-start-context.md

      - name: Verify post-start skill content
        shell: bash
        run: grep -qi "governance gates" src/skills/post-start-validation.md

      - name: Verify agent content
        shell: bash
        run: grep -qi "START IMMEDIATELY" src/crag-agent.md

      - name: Compile all targets (smoke test)
        shell: bash
        env:
          CRAG_NO_UPDATE_CHECK: '1'
        run: |
          # compile needs .claude/governance.md — regenerate it via analyze
          # (the crag repo does not track .claude/; it's generated)
          node bin/crag.js analyze > /dev/null
          node bin/crag.js compile --target all
          # Verify every expected artifact exists
          test -f .github/workflows/gates.yml
          test -f .husky/pre-commit
          test -f .pre-commit-config.yaml
          test -f AGENTS.md
          test -f .cursor/rules/governance.mdc
          test -f GEMINI.md
          test -f .github/copilot-instructions.md
          test -f .clinerules
          test -f .continuerules
          test -f .windsurf/rules/governance.md
          test -f .rules
          test -f .amazonq/rules/governance.md
          echo "All 12 compile targets produced artifacts."
          # Clean up — everything above is gitignored, just rm it
          rm -f AGENTS.md GEMINI.md .clinerules .continuerules .rules .pre-commit-config.yaml
          rm -rf .cursor .husky .windsurf .amazonq .claude
          rm -f .github/copilot-instructions.md .github/workflows/gates.yml
