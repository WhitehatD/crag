# crag:auto-start
# Generated from governance.md by crag — https://crag.sh
# Regenerate: crag compile --target github
name: Governance Guard

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.forgejo/workflows/**'
      - '.gitea/workflows/**'
      - '.gitlab-ci.yml'
      - '.circleci/**'
      - '.travis.yml'
      - 'azure-pipelines.yml'
      - '.buildkite/**'
      - '.drone.yml'
      - '.woodpecker/**'
      - 'bitbucket-pipelines.yml'
      - 'Jenkinsfile'
      - '.cirrus.yml'
      - 'Makefile'
      - 'Taskfile.yml'
      - 'justfile'

jobs:
  guard:
    name: "CI \u2194 Governance Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Check CI and governance are in sync
        run: |
          # Repos that do not COMMIT .claude/governance.md (crag itself
          # gitignores it) bootstrap one from the codebase first — diff then
          # checks the workflows against derived reality. Repos that DO
          # commit governance get the real committed-vs-CI drift check.
          npm install -g @whitehatd/crag > /dev/null 2>&1
          if [ ! -f .claude/governance.md ]; then
            crag analyze > /dev/null
          fi
          crag diff --ci

# crag:auto-end
