name: Release

# Fully automated release pipeline with auto-patch-bump on every push.
#
# Trigger: every push to master (except auto-bump commits, which carry [skip ci]).
# Behavior:
#   1. Run all gates + test suite on Ubuntu (fast path)
#   2. Read package.json version
#   3. Ask the npm registry if that version is already published
#   4a. If NEW — proceed directly to publish
#   4b. If already published — auto-bump patch, commit with [skip ci],
#       push back to master, then proceed to publish with the bumped version
#   5. Publish to npm with SLSA provenance (--access=public for the scoped pkg)
#   6. Create annotated git tag vX.Y.Z
#   7. Create GitHub release with notes from CHANGELOG.md
#
# Result: every push that contains real code changes ships a new patch
# version to npm. If you want a minor/major bump, run `npm run release:minor`
# or `npm run release:major` locally before pushing — the workflow respects
# an explicit bump and does not auto-bump on top of it.
#
# Secrets required:
#   NPM_TOKEN — granular access token with bypass-2FA, published to `@whitehatd/crag`
#
# To opt out of auto-bump for a specific push (e.g. docs-only changes you
# don't want shipped), put `crag:skip-release` on its own line in the
# commit body. We use a distinctive marker (not [skip release]) because
# commit bodies may legitimately mention the latter in prose.

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish even if version appears already published (use carefully)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write    # create git tags + GitHub releases
  id-token: write    # npm provenance (SLSA attestation via GitHub OIDC)
  packages: write    # (future: GitHub Packages publish)

jobs:
  gates:
    name: Run gates + tests
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.final_version.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}
      skipped: ${{ steps.skip_check.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Need write access so we can push the auto-bump commit back to master.
          # The default GITHUB_TOKEN has this when `permissions: contents: write` is set.
          token: ${{ secrets.GITHUB_TOKEN }}

      # Opt-out marker: put `crag:skip-release` on its OWN line in the commit
      # body to tell this workflow not to publish. We intentionally use a
      # distinctive marker (not the common "[skip release]" string) because
      # feature commits may legitimately mention "[skip release]" in prose
      # when documenting the marker itself.
      - name: Check for crag:skip-release marker
        id: skip_check
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -qxE '[[:space:]]*crag:skip-release[[:space:]]*'; then
            echo "::notice::Commit contains 'crag:skip-release' line — skipping publish"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Run syntax checks
        shell: bash
        run: |
          set -e
          for f in bin/crag.js src/cli.js src/commands/*.js src/workspace/*.js src/governance/*.js src/compile/*.js src/update/*.js src/analyze/*.js; do
            node --check "$f"
          done

      # CLI smoke tests. Intentionally does NOT include `crag check` or
      # `crag diff` — those verify a Claude Code session's infrastructure
      # (.claude/skills/, .claude/hooks/, .claude/governance.md) and are
      # meaningless on a bare CI runner with no Claude CLI. CI validates
      # *source code*; session-context gates are for developer machines.
      - name: Run CLI smoke tests
        env:
          CRAG_NO_UPDATE_CHECK: '1'
        run: |
          node bin/crag.js help > /dev/null
          node bin/crag.js version
          node bin/crag.js analyze --dry-run > /dev/null
          node bin/crag.js upgrade --check > /dev/null
          node bin/crag.js workspace --json > /dev/null

      - name: Run test suite
        run: node test/all.js

      - name: Verify skill content
        shell: bash
        run: |
          grep -qi "discovers any project" src/skills/pre-start-context.md
          grep -qi "governance gates" src/skills/post-start-validation.md
          grep -qi "START IMMEDIATELY" src/crag-agent.md

      - name: Smoke test compile --target all
        shell: bash
        run: |
          node bin/crag.js compile --target all
          # Every expected artifact must exist
          test -f .github/workflows/gates.yml
          test -f .husky/pre-commit
          test -f .pre-commit-config.yaml
          test -f AGENTS.md
          test -f .cursor/rules/governance.mdc
          test -f GEMINI.md
          test -f .github/copilot-instructions.md
          test -f .clinerules
          test -f .continuerules
          test -f .windsurfrules
          test -f .zed/rules.md
          test -f .sourcegraph/cody-instructions.md
          echo "All 12 compile targets produced artifacts."
          # Clean up — these are all gitignored, so we just rm them.
          rm -f .github/workflows/gates.yml
          rm -rf .husky .cursor .zed .sourcegraph
          rm -f .pre-commit-config.yaml AGENTS.md GEMINI.md .clinerules .continuerules .windsurfrules
          rm -f .github/copilot-instructions.md
          # Also clean the bootstrapped .claude/ so subsequent steps don't
          # see a polluted tree. They already passed their checks.
          rm -rf .claude

      - name: Read package.json version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package version: $VERSION"

      - name: Auto-bump patch if version already on npm
        id: autobump
        if: steps.skip_check.outputs.skipped != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          PKG_NAME=$(node -p "require('./package.json').name")

          # Skip auto-bump if this push already IS an auto-bump commit.
          # Without this guard, the bump commit could re-trigger the workflow
          # (though [skip ci] should prevent it — belt and suspenders).
          LAST_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_MSG" | grep -qE '^chore: auto-release v' || echo "$LAST_MSG" | grep -q '\[skip ci\]'; then
            echo "Head is already an auto-bump commit — no further action"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "final_version=$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Checking if $PKG_NAME@$VERSION is already on npm..."
          if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::Version $VERSION is already published — auto-bumping patch"

            # Bump package.json + CHANGELOG.md via the existing script
            node scripts/bump-version.js patch

            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "Bumped $VERSION → $NEW_VERSION"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json CHANGELOG.md
            git commit -m "chore: auto-release v$NEW_VERSION [skip ci]

            Auto-bumped from v$VERSION by .github/workflows/release.yml
            because v$VERSION was already published to npm. This commit
            is the authoritative source for the v$NEW_VERSION release."

            # Push the bump back to the branch that triggered this workflow.
            # github.ref_name is e.g. "master" on a push event.
            git push origin "HEAD:${GITHUB_REF_NAME}"

            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "final_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION is new — no bump needed"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "final_version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Record final version for publish job
        id: final_version
        shell: bash
        run: |
          # Fall back to pkg.outputs.version if autobump was skipped
          FINAL="${{ steps.autobump.outputs.final_version || steps.pkg.outputs.version }}"
          echo "version=$FINAL" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: check
        shell: bash
        run: |
          # Honor the crag:skip-release marker
          if [ "${{ steps.skip_check.outputs.skipped }}" = "true" ]; then
            echo "Skipping publish — crag:skip-release marker present"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${{ steps.final_version.outputs.version }}"
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "Checking if $PKG_NAME@$VERSION is already on npm..."

          # After auto-bump, this should always be NEW. But if someone manually
          # set a version that's already published and auto-bump didn't fire
          # (e.g. on the second run of an auto-bump commit), skip gracefully.
          if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published."
            if [ "${{ github.event.inputs.force_publish }}" = "true" ]; then
              echo "force_publish=true — proceeding anyway"
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "Skipping publish — auto-bump was suppressed (likely a [skip ci] commit)"
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Version $VERSION is NEW — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to npm + create tag + GitHub release
    needs: gates
    if: needs.gates.outputs.should_publish == 'true' && needs.gates.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@whitehatd/crag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that can push tags (default GITHUB_TOKEN can with permissions: contents: write)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify NPM_TOKEN is set
        shell: bash
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::Generate a granular token at https://www.npmjs.com/settings/whitehatd/tokens with 'bypass 2FA' enabled for @whitehatd/crag."
            exit 1
          fi
          echo "NPM_TOKEN is configured."
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Inspect tarball before publishing
        run: npm pack --dry-run

      - name: Publish to npm with SLSA provenance
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publish succeeded on registry
        shell: bash
        run: |
          VERSION="${{ needs.gates.outputs.version }}"
          PKG_NAME=$(node -p "require('./package.json').name")
          # Registry indexing can take 5–60 seconds
          for i in 1 2 3 4 5 6; do
            if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "::notice::$PKG_NAME@$VERSION is live on https://www.npmjs.com/package/$PKG_NAME"
              exit 0
            fi
            echo "Not indexed yet, waiting 15s..."
            sleep 15
          done
          echo "::warning::Registry did not confirm within 90s. The publish likely succeeded; verify manually."

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated git tag
        shell: bash
        run: |
          VERSION="${{ needs.gates.outputs.version }}"
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally — skipping tag creation."
          else
            git tag -a "$TAG" -m "Release $TAG

          Auto-released by .github/workflows/release.yml on push to master.
          See CHANGELOG.md for changes."
            git push origin "$TAG"
            echo "Tag $TAG pushed."
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${{ needs.gates.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md.
          # Format: ## [X.Y.Z] — date ... until the next ## [ heading.
          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md found — using default notes"
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "Release $VERSION" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION (no CHANGELOG entry found — update CHANGELOG.md for richer release notes)"
          fi

          {
            echo "notes<<CRAGEOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "**Install:** \`npm install -g @whitehatd/crag@$VERSION\`"
            echo ""
            echo "**Package:** https://www.npmjs.com/package/@whitehatd/crag/v/$VERSION"
            echo ""
            echo "CRAGEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gates.outputs.version }}
          name: crag v${{ needs.gates.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.gates.outputs.version, '-') }}
          make_latest: ${{ !contains(needs.gates.outputs.version, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          VERSION="${{ needs.gates.outputs.version }}"
          echo "## 🚀 Released crag v$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm:** https://www.npmjs.com/package/@whitehatd/crag/v/$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **GitHub release:** https://github.com/${{ github.repository }}/releases/tag/v$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Install:** \`npm install -g @whitehatd/crag@$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published via fully automated pipeline on push to \`master\`." >> "$GITHUB_STEP_SUMMARY"
