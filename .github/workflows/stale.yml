name: Stale issue / PR cleanup

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 03:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been inactive for 60 days and will be closed in 14 days if no further activity occurs.
            If it's still relevant, leave a comment or reopen. Priority issues are exempt from auto-close.
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          exempt-issue-labels: 'pinned,security,priority,good-first-issue,help-wanted'

          # Pull requests
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been inactive for 30 days and will be closed in 14 days if no further activity occurs.
          close-pr-message: |
            Closing due to inactivity. Feel free to reopen and rebase if you'd like to continue.
          exempt-pr-labels: 'work-in-progress,pinned,security'

          # General
          ascending: true
          operations-per-run: 30
