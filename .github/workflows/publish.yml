name: Publish to npm

# Trigger on tagged releases (v0.2.0, v1.0.0, etc.)
# Also allow manual dispatch for hot-fix publishes.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish dry-run (no upload)'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for npm provenance (SLSA attestation)

jobs:
  publish:
    name: Publish @whitehatd/crag to npm
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@whitehatd/crag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch. Tag is $TAG_VERSION but package.json says $PKG_VERSION."
            exit 1
          fi

      - name: Run gates before publish
        run: |
          node --check bin/crag.js
          node bin/crag.js help > /dev/null
          node bin/crag.js version
          node bin/crag.js check
          node bin/crag.js analyze --dry-run > /dev/null
          node bin/crag.js diff > /dev/null
          node bin/crag.js upgrade --check > /dev/null
        env:
          CRAG_NO_UPDATE_CHECK: '1'

      - name: Run test suite
        run: node test/all.js

      - name: Inspect tarball contents
        run: npm pack --dry-run

      - name: Dry-run publish
        if: inputs.dry_run == true
        run: npm publish --dry-run --access=public --provenance

      - name: Publish to npm with provenance
        if: inputs.dry_run != true
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publish succeeded
        if: inputs.dry_run != true
        shell: bash
        run: |
          sleep 10
          PKG_VERSION=$(node -p "require('./package.json').version")
          # Public registry can take up to a minute to propagate
          for i in 1 2 3 4 5; do
            if npm view "@whitehatd/crag@$PKG_VERSION" version; then
              echo "::notice::Package @whitehatd/crag@$PKG_VERSION is live on npm."
              exit 0
            fi
            echo "Not indexed yet, waiting 15s..."
            sleep 15
          done
          echo "::error::Package did not appear on the registry within 75s."
          exit 1
